<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="Shareable invite links for Matrix rooms and users."/>
<title>escape.feds.farm</title>
<style>
  :root{
    --bg:#0d1014;
    --card:#15191f;
    --raise:#1c2129;
    --border:#272d37;
    --border-strong:#3a4350;
    --text:#e7eaee;
    --muted:#9aa4b1;
    --faint:#5e6873;
    --accent:#0dbd8b;
    --accent-strong:#17d19d;
    --accent-dim:rgba(13,189,139,.12);
    --error:#f08c8c;
    --radius:12px;
    --radius-sm:8px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:16px;}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    padding:24px;background:var(--bg);color:var(--text);
    font-family:system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
    line-height:1.5;
  }
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;}

  .card{
    width:100%;max-width:560px;padding:32px;
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:0 16px 48px rgba(0,0,0,.4);
    animation:fadeIn .25s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  @keyframes pulse{0%,100%{opacity:.35;}50%{opacity:1;}}

  .brand{display:flex;align-items:center;gap:10px;margin-bottom:24px;}
  .brand-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;}
  .brand-name{font-size:.875rem;font-weight:600;}
  .brand-tag{font-size:.8rem;color:var(--faint);}

  h1{font-size:1.25rem;font-weight:650;margin-bottom:6px;}
  .sub{font-size:.875rem;color:var(--muted);margin-bottom:20px;}

  .input-row{display:flex;gap:8px;}
  .id-input{
    flex:1;min-width:0;padding:10px 14px;
    background:var(--bg);border:1px solid var(--border-strong);border-radius:var(--radius-sm);
    color:var(--text);font-size:.875rem;outline:none;transition:border-color .15s;
  }
  .id-input:focus{border-color:var(--accent);}
  .id-input::placeholder{color:var(--faint);}
  .go-btn{
    padding:10px 20px;border:none;border-radius:var(--radius-sm);
    background:var(--accent);color:#08110d;font-size:.875rem;font-weight:650;
    font-family:inherit;cursor:pointer;transition:background .15s;white-space:nowrap;
  }
  .go-btn:hover{background:var(--accent-strong);}
  .input-error{font-size:.8rem;color:var(--error);margin-top:8px;min-height:20px;}

  .examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
  .ex-chip{
    padding:4px 12px;border-radius:999px;font-size:.8rem;
    background:none;border:1px solid var(--border);color:var(--muted);
    cursor:pointer;transition:border-color .15s,color .15s;
  }
  .ex-chip:hover{border-color:var(--border-strong);color:var(--text);}

  .home-preview{display:none;margin-top:16px;}
  .home-preview.visible{display:block;animation:fadeIn .2s ease;}

  .back-link{
    display:inline-block;margin-bottom:16px;font-size:.8rem;
    color:var(--muted);text-decoration:none;cursor:pointer;
  }
  .back-link:hover{color:var(--text);}

  /* Preview card */
  .preview-card{
    display:flex;align-items:center;gap:14px;min-height:72px;
    padding:14px 16px;border-radius:var(--radius-sm);
    background:var(--raise);border:1px solid var(--border);
  }
  .avatar{
    position:relative;width:48px;height:48px;border-radius:50%;flex-shrink:0;
    background:var(--accent-dim);color:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-size:1.25rem;font-weight:650;overflow:hidden;
  }
  .avatar.room{border-radius:var(--radius-sm);}
  .avatar img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .preview-info{flex:1;min-width:0;}
  .preview-name{font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .preview-meta{font-size:.8rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .preview-topic{font-size:.8rem;color:var(--faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
  .loading-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);animation:pulse 1s infinite;flex-shrink:0;}

  .identity{margin:16px 0 20px;}
  .identity-type{font-size:.8rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;}
  .identity-id{font-size:1.125rem;font-weight:600;word-break:break-all;}
  .identity-id .sigil{color:var(--accent);}

  .section-label{font-size:.8rem;color:var(--faint);margin:20px 0 10px;}

  .buttons{display:flex;flex-direction:column;gap:8px;}
  a.btn{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:10px 14px;border-radius:var(--radius-sm);text-decoration:none;
    background:var(--raise);border:1px solid var(--border);color:var(--text);
    cursor:pointer;transition:border-color .15s,background .15s;
  }
  a.btn:hover{border-color:var(--border-strong);background:#20262f;}
  a.btn.primary{background:var(--accent-dim);border-color:rgba(13,189,139,.4);}
  a.btn.primary:hover{border-color:var(--accent);}
  .btn-left{display:flex;align-items:center;gap:12px;min-width:0;}
  .btn-icon{width:24px;height:24px;flex-shrink:0;}
  .btn-name{font-size:.875rem;font-weight:600;}
  .btn-desc{font-size:.8rem;color:var(--muted);font-weight:400;}
  .btn-arrow{color:var(--faint);font-size:.875rem;transition:color .15s,transform .15s;}
  a.btn:hover .btn-arrow{color:var(--text);transform:translateX(2px);}

  .copy-row{display:flex;gap:8px;}
  .copy-input{
    flex:1;min-width:0;padding:8px 12px;
    background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);
    color:var(--muted);font-size:.8rem;outline:none;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;
  }
  .copy-btn{
    padding:8px 16px;border-radius:var(--radius-sm);
    background:none;border:1px solid var(--border-strong);color:var(--text);
    font-size:.8rem;font-weight:600;font-family:inherit;cursor:pointer;
    transition:border-color .15s,color .15s;white-space:nowrap;
  }
  .copy-btn:hover{border-color:var(--accent);color:var(--accent);}
  .copy-btn.ok{border-color:var(--accent);color:var(--accent);}

  .footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);}
  .footer a{font-size:.8rem;color:var(--faint);text-decoration:none;}
  .footer a:hover{color:var(--muted);}

  /* Element popup */
  .overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(0,0,0,.6);align-items:center;justify-content:center;padding:24px;
  }
  .overlay.open{display:flex;}
  .popup{
    width:100%;max-width:400px;padding:24px;position:relative;
    background:var(--card);border:1px solid var(--border-strong);border-radius:var(--radius);
    box-shadow:0 24px 64px rgba(0,0,0,.5);animation:fadeIn .2s ease;
  }
  .popup h2{font-size:1rem;font-weight:650;margin-bottom:6px;}
  .popup-sub{font-size:.8rem;color:var(--muted);margin-bottom:16px;}
  .popup-close{
    position:absolute;top:12px;right:12px;padding:4px 10px;line-height:1;
    background:none;border:none;color:var(--faint);font-size:1.25rem;cursor:pointer;
  }
  .popup-close:hover{color:var(--text);}
  .popup .buttons{margin-bottom:12px;}
  .popup-note{font-size:.8rem;color:var(--faint);}

  @media(max-width:480px){
    .card{padding:24px 18px;}
    .identity-id{font-size:1rem;}
  }
</style>
</head>
<body>

<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="popup">
    <button class="popup-close" onclick="closePopup()" aria-label="Close">&times;</button>
    <h2>Open in Element Desktop</h2>
    <p class="popup-sub">This uses the <span class="mono">element://</span> link scheme, so the desktop app must be installed.</p>
    <div class="buttons" id="popup-opts"></div>
    <p class="popup-note">Nothing happening? Install Element first, or use Element Web instead.</p>
  </div>
</div>

<div class="card" id="card"></div>

<script>
(function(){
const MY_DOMAIN=window.location.origin;

// Same roster as matrix.to. Clients without a real deep link get their
// homepage — no invented URL schemes.
const CLIENTS=[
  {
    name:'Element',
    desc:'app.element.io — opens in your browser',
    icon:'icons/element.svg',
    primary:true,
    url:{room:id=>`https://app.element.io/#/room/${enc(id)}`,user:id=>`https://app.element.io/#/user/${enc(id)}`}
  },
  {
    name:'Element Desktop',
    desc:'element:// — requires the desktop app',
    icon:'icons/element.svg',
    popup:true
  },
  {
    name:'SchildiChat',
    desc:'app.schildi.chat — Element fork',
    icon:'icons/schildichat.svg',
    url:{room:id=>`https://app.schildi.chat/#/room/${enc(id)}`,user:id=>`https://app.schildi.chat/#/user/${enc(id)}`}
  },
  {
    name:'Cinny',
    desc:'app.cinny.in — web client',
    icon:'icons/cinny.svg',
    home:'https://app.cinny.in/'
  },
  {
    name:'FluffyChat',
    desc:'fluffychat.im — web & mobile',
    icon:'icons/fluffychat.svg',
    home:'https://fluffychat.im/web'
  },
  {
    name:'Nheko',
    desc:'desktop app',
    icon:'icons/nheko.svg',
    home:'https://github.com/Nheko-Reborn/nheko'
  },
  {
    name:'Fractal',
    desc:'GNOME desktop app',
    icon:'icons/fractal.svg',
    home:'https://gitlab.gnome.org/World/fractal'
  },
  {
    name:'Quaternion',
    desc:'desktop app',
    icon:'icons/quaternion.svg',
    home:'https://github.com/quotient-im/Quaternion'
  },
  {
    name:'NeoChat',
    desc:'KDE desktop app',
    icon:'icons/neochat.svg',
    home:'https://apps.kde.org/neochat/'
  },
  {
    name:'Weechat',
    desc:'terminal client (weechat-matrix)',
    icon:'icons/weechat.svg',
    home:'https://weechat.org/'
  },
  {
    name:'Thunderbird',
    desc:'email client with Matrix support',
    icon:'icons/thunderbird.svg',
    home:'https://www.thunderbird.net/'
  },
];

let _pid=null,_ptype=null;

// ── Popup ─────────────────────────────────────────────────────
window.openPopup=function(){
  if(!_pid) return;
  // Same scheme matrix.to uses for Element Desktop.
  const href=`element://vector/webapp/#/${_ptype==='room'?'room':'user'}/${enc(_pid)}`;
  document.getElementById('popup-opts').innerHTML=`
    <a class="btn primary" href="${esc(href)}" onclick="closePopup()">
      <span class="btn-left"><img class="btn-icon" src="icons/element.svg" alt=""/><span class="btn-name">Launch Element</span></span><span class="btn-arrow">&rarr;</span>
    </a>
    <a class="btn" href="https://element.io/download" target="_blank" rel="noopener" onclick="closePopup()">
      <span class="btn-left"><span><span class="btn-name">Download Element</span> <span class="btn-desc">Web &middot; Desktop &middot; Android &middot; iOS</span></span></span><span class="btn-arrow">&rarr;</span>
    </a>`;
  document.getElementById('overlay').classList.add('open');
};
window.closePopup=function(){
  document.getElementById('overlay').classList.remove('open');
};
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closePopup(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePopup(); });

window.copyLink=function(){
  const inp=document.getElementById('copy-inp');
  const btn=document.getElementById('copy-btn');
  if(!inp) return;
  navigator.clipboard.writeText(inp.value).then(()=>{
    btn.textContent='Copied';btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='Copy';btn.classList.remove('ok'); },2000);
  });
};

// ── Home page ─────────────────────────────────────────────────
function renderHome(){
  document.title='escape.feds.farm';
  document.getElementById('card').innerHTML=`
    ${brandHtml()}
    <h1>Create a Matrix invite link</h1>
    <p class="sub">Enter a room alias or user ID to get a shareable link.</p>
    <div class="input-row">
      <input class="id-input mono" id="id-input" placeholder="#room:server.tld or @user:server.tld" autocomplete="off" spellcheck="false"/>
      <button class="go-btn" onclick="goFromInput()">Go</button>
    </div>
    <div class="input-error" id="input-err"></div>
    <div class="examples">
      <button class="ex-chip mono" onclick="setInput('#main:feds.farm')">#main:feds.farm</button>
      <button class="ex-chip mono" onclick="setInput('@root:feds.farm')">@root:feds.farm</button>
      <button class="ex-chip mono" onclick="setInput('#matrix:matrix.org')">#matrix:matrix.org</button>
    </div>
    <div id="home-preview" class="home-preview"></div>
    ${footerHtml()}`;

  const inp=document.getElementById('id-input');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') goFromInput(); });
  inp.addEventListener('input',debounce(onInputChange,500));
  inp.focus();
}

function brandHtml(){
  return `<div class="brand"><span class="brand-dot"></span><span class="brand-name">escape.feds.farm</span><span class="brand-tag">matrix invite links</span></div>`;
}
function footerHtml(){
  return `<div class="footer"><a href="https://github.com/zeroarchroot/escape.feds.farm" target="_blank" rel="noopener">Source on GitHub</a></div>`;
}

window.setInput=function(val){
  document.getElementById('id-input').value=val;
  onInputChange();
};

let _debTimer=null;
function debounce(fn,ms){ return function(){ clearTimeout(_debTimer);_debTimer=setTimeout(fn,ms); }; }

async function onInputChange(){
  const inp=document.getElementById('id-input');
  const prev=document.getElementById('home-preview');
  if(!inp||!prev) return;
  const val=inp.value.trim();
  document.getElementById('input-err').textContent='';
  if(!classify(val)||!val.includes(':')){
    prev.classList.remove('visible');
    prev.innerHTML='';
    return;
  }
  prev.classList.add('visible');
  prev.innerHTML=loadingHtml();
  const html=await previewHtml(val);
  // Only apply if the input hasn't changed while fetching.
  if(inp.value.trim()===val) prev.innerHTML=html;
}

window.goFromInput=function(){
  const val=(document.getElementById('id-input').value||'').trim();
  if(!val){ setErr('Enter a room alias or user ID.'); return; }
  if(!classify(val)){ setErr('Must start with # (room) or @ (user).'); return; }
  if(!val.includes(':')){ setErr('Must include a server name, e.g. #room:server.tld'); return; }
  window.location.hash=val;
};
function setErr(msg){ const e=document.getElementById('input-err'); if(e) e.textContent=msg; }

// ── Invite page ───────────────────────────────────────────────
async function renderInvite(id){
  const type=classify(id);
  document.title=`${id} — escape.feds.farm`;
  // For #aliases the sigil doubles as the URL hash separator: /#main:feds.farm
  const shareUrl=`${MY_DOMAIN}/${id[0]==='#'?id:'#'+id}`;
  _pid=id;_ptype=type;

  const btnHtml=CLIENTS.map(c=>{
    const inner=`<span class="btn-left"><img class="btn-icon" src="${c.icon}" alt=""/><span><span class="btn-name">${c.name}</span> <span class="btn-desc">${c.desc}</span></span></span><span class="btn-arrow">&rarr;</span>`;
    if(c.popup) return `<a class="btn" href="javascript:void(0)" onclick="openPopup()" role="button">${inner}</a>`;
    const href=c.url?(type==='room'?c.url.room(id):c.url.user(id)):c.home;
    return `<a class="btn${c.primary?' primary':''}" href="${esc(href)}" target="_blank" rel="noopener noreferrer">${inner}</a>`;
  }).join('');

  document.getElementById('card').innerHTML=`
    ${brandHtml()}
    <a class="back-link" onclick="goHome()">&larr; Create another link</a>
    <div class="identity">
      <div class="identity-type">${type==='room'?'Room':'User'}</div>
      <div class="identity-id mono"><span class="sigil">${esc(id[0])}</span>${esc(id.slice(1))}</div>
    </div>
    <div id="preview-slot">${loadingHtml()}</div>
    <div class="section-label">Open with</div>
    <div class="buttons">${btnHtml}</div>
    <div class="section-label">Share this link</div>
    <div class="copy-row">
      <input class="copy-input mono" id="copy-inp" type="text" readonly value="${esc(shareUrl)}"/>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy</button>
    </div>
    ${footerHtml()}`;

  const html=await previewHtml(id);
  const slot=document.getElementById('preview-slot');
  if(slot&&slot.isConnected) slot.innerHTML=html;
}

window.goHome=function(){ window.location.hash=''; };

// ── Router ────────────────────────────────────────────────────
function route(){
  const id=getId();
  if(id&&classify(id)) renderInvite(id);
  else renderHome();
}
window.addEventListener('hashchange',route);
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',route);
else route();

// ── Helpers ───────────────────────────────────────────────────
function enc(s){ return encodeURIComponent(s); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function serverOf(id){ const c=id.indexOf(':'); return c>0?id.slice(c+1):null; }
function classify(id){
  if(!id) return null;
  if(id.startsWith('@')) return 'user';
  if(/^[#!]/.test(id)) return 'room';
  return null;
}
function getId(){
  const h=window.location.hash.slice(1);
  if(!h) return '';
  // Bare "room:server" in the hash (the # was eaten by the URL) — restore it.
  if(!/^[@#!]/.test(h)&&h.includes(':')) return '#'+h;
  return h;
}

// ── Matrix API ────────────────────────────────────────────────
const _hsCache={};
async function resolveHS(server){
  if(_hsCache[server]) return _hsCache[server];
  try{
    const r=await fetch(`https://${server}/.well-known/matrix/client`,{signal:AbortSignal.timeout(4000)});
    if(r.ok){
      const j=await r.json();
      const base=(j['m.homeserver']||{}).base_url;
      if(base){ _hsCache[server]=base.replace(/\/$/,''); return _hsCache[server]; }
    }
  }catch(_){}
  _hsCache[server]=`https://${server}`;
  return _hsCache[server];
}

function mxcToHttp(mxc,size){
  if(!mxc||!mxc.startsWith('mxc://')) return null;
  const rest=mxc.slice(6);
  const slash=rest.indexOf('/');
  if(slash<0) return null;
  const mediaServer=rest.slice(0,slash),mediaId=rest.slice(slash+1);
  return `https://${mediaServer}/_matrix/media/v3/thumbnail/${mediaServer}/${mediaId}?width=${size}&height=${size}&method=crop`;
}

async function fetchUserProfile(userId){
  const server=serverOf(userId);
  if(!server) return null;
  const hs=await resolveHS(server);
  const r=await fetch(`${hs}/_matrix/client/v3/profile/${enc(userId)}`,{signal:AbortSignal.timeout(5000)});
  if(!r.ok) return null;
  return r.json();
}

// Room summary via MSC3266 (stable in Matrix 1.15, unstable prefix as fallback).
// Falls back to a bare directory lookup to at least confirm the alias resolves.
async function fetchRoomPreview(id){
  const server=serverOf(id);
  if(!server) return null;
  const hs=await resolveHS(server);
  const via=id[0]==='!'?`?via=${enc(server)}`:'';
  const urls=[
    `${hs}/_matrix/client/v1/room_summary/${enc(id)}${via}`,
    `${hs}/_matrix/client/unstable/im.nheko.summary/rooms/${enc(id)}/summary${via}`,
  ];
  for(const url of urls){
    try{
      const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
      if(r.ok){
        const j=await r.json();
        return {name:j.name||id,topic:j.topic||null,avatar_url:j.avatar_url||null,members:j.num_joined_members??null,server};
      }
    }catch(_){}
  }

  // No summary API — resolve the alias, then look for an exact match in the
  // server's public directory (POST search needs auth, GET does not).
  let roomId=id[0]==='!'?id:null;
  if(id[0]==='#'){
    try{
      const r=await fetch(`${hs}/_matrix/client/v3/directory/room/${enc(id)}`,{signal:AbortSignal.timeout(5000)});
      if(!r.ok) return null;
      roomId=(await r.json()).room_id||null;
    }catch(_){ return null; }
  }
  const match=await findInPublicRooms(hs,id,roomId);
  if(match) return {name:match.name||match.canonical_alias||id,topic:match.topic||null,avatar_url:match.avatar_url||null,members:match.num_joined_members??null,server};
  // Alias resolves but room isn't in the public directory — minimal preview.
  return roomId?{name:id,topic:null,avatar_url:null,members:null,server}:null;
}

async function findInPublicRooms(hs,id,roomId){
  let since='';
  for(let page=0;page<3;page++){
    try{
      const r=await fetch(`${hs}/_matrix/client/v3/publicRooms?limit=200${since?`&since=${enc(since)}`:''}`,{signal:AbortSignal.timeout(5000)});
      if(!r.ok) return null;
      const j=await r.json();
      const match=(j.chunk||[]).find(rm=>
        (roomId&&rm.room_id===roomId)||rm.canonical_alias===id||(rm.aliases||[]).includes(id));
      if(match) return match;
      since=j.next_batch||'';
      if(!since) return null;
    }catch(_){ return null; }
  }
  return null;
}

// ── Preview rendering ─────────────────────────────────────────
async function previewHtml(id){
  const type=classify(id);
  try{
    if(type==='user'){
      const p=await fetchUserProfile(id);
      if(!p) return errorHtml(id,'No public profile available');
      return userPreviewHtml(id,p);
    }
    const room=await fetchRoomPreview(id);
    if(!room) return errorHtml(id,'No public preview available');
    return roomPreviewHtml(room);
  }catch(_){
    return errorHtml(id,'Could not load preview');
  }
}

function avatarHtml(name,avatarUrl,isRoom){
  const letter=esc((name||'?')[0].toUpperCase());
  const cls=isRoom?'avatar room':'avatar';
  const httpUrl=mxcToHttp(avatarUrl,96);
  // Letter sits underneath; if the image fails to load it just disappears.
  const img=httpUrl?`<img src="${esc(httpUrl)}" alt="" onerror="this.remove()"/>`:'';
  return `<div class="${cls}">${letter}${img}</div>`;
}
function userPreviewHtml(userId,profile){
  const name=profile.displayname||userId;
  return `
    <div class="preview-card">
      ${avatarHtml(name,profile.avatar_url,false)}
      <div class="preview-info">
        <div class="preview-name">${esc(name)}</div>
        <div class="preview-meta mono">${esc(userId)}</div>
      </div>
    </div>`;
}
function roomPreviewHtml(room){
  const meta=[room.members!=null?`${room.members} member${room.members===1?'':'s'}`:null,room.server]
    .filter(Boolean).join(' · ');
  return `
    <div class="preview-card">
      ${avatarHtml(room.name,room.avatar_url,true)}
      <div class="preview-info">
        <div class="preview-name">${esc(room.name)}</div>
        <div class="preview-meta">${esc(meta)}</div>
        ${room.topic?`<div class="preview-topic">${esc(room.topic)}</div>`:''}
      </div>
    </div>`;
}
function loadingHtml(){
  return `<div class="preview-card"><div class="preview-info"><div class="preview-name">Loading&hellip;</div><div class="preview-meta">Fetching preview</div></div><div class="loading-dot"></div></div>`;
}
function errorHtml(id,msg){
  return `<div class="preview-card"><div class="preview-info"><div class="preview-name mono">${esc(id)}</div><div class="preview-meta">${esc(msg)}</div></div></div>`;
}
})();
</script>
</body>
