<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>escape.feds.farm</title>
<style>
  :root {
    --bg: #000000;
    --green: #00ff41;
    --orange: #ff6600;
    --muted: rgba(0,255,65,0.75);
    --dim: rgba(0,255,65,0.35);
    --faint: rgba(0,255,65,0.12);
    --radius: 12px;
    font-family: 'Courier New', Courier, monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow-x:hidden;font-size:16px;color:var(--green);}
  body{
    display:flex;align-items:center;justify-content:center;
    background:var(--bg);position:relative;min-height:100vh;padding:20px;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,65,.015) 2px,rgba(0,255,65,.015) 4px);
    pointer-events:none;z-index:0;
  }
  body::after{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(0,255,65,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.025) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }

  /* ── Shared card ── */
  .card{
    position:relative;z-index:1;width:100%;max-width:620px;
    padding:36px 40px;border-radius:var(--radius);
    background:rgba(0,0,0,.9);backdrop-filter:blur(12px);
    border:1px solid rgba(0,255,65,.2);
    box-shadow:0 0 60px rgba(0,255,65,.05);
    animation:fadeIn .3s ease;
  }
  .card::before{content:'> _';position:absolute;top:14px;left:20px;font-size:10px;color:rgba(0,255,65,.2);}
  .card::after{content:'[matrix]';position:absolute;bottom:14px;right:20px;font-size:10px;color:rgba(0,255,65,.15);letter-spacing:2px;}
  .card-footer-line{
    position:absolute;bottom:14px;left:20px;right:90px;
    font-size:10px;color:rgba(0,255,65,.15);letter-spacing:2px;
    display:flex;gap:12px;z-index:1;
  }
  .card-footer-line a{color:rgba(0,255,65,.18);text-decoration:none;transition:color .15s;}
  .card-footer-line a:hover{color:rgba(0,255,65,.5);}

  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:.4;}50%{opacity:1;}}

  /* ── Brand ── */
  .brand{display:flex;gap:10px;align-items:center;margin-bottom:28px;}
  .badge{background:var(--green);color:#000;padding:3px 10px;border-radius:999px;font-weight:700;font-size:11px;letter-spacing:1px;}
  .brand-label{font-size:10px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;}

  /* ══ HOME PAGE ═════════════════════════════════════════ */
  #page-home h1{font-size:1.5rem;margin-bottom:8px;}
  #page-home .sub{font-size:.85rem;color:var(--dim);margin-bottom:28px;line-height:1.6;}

  .input-row{
    display:flex;gap:8px;margin-bottom:10px;
  }
  .matrix-input{
    flex:1;background:rgba(0,255,65,.04);border:1px solid rgba(0,255,65,.25);
    border-radius:8px;padding:11px 14px;color:var(--green);
    font-family:inherit;font-size:.9rem;outline:none;transition:border-color .15s;
  }
  .matrix-input:focus{border-color:rgba(0,255,65,.6);}
  .matrix-input::placeholder{color:rgba(0,255,65,.25);}
  .go-btn{
    padding:11px 18px;border-radius:8px;background:rgba(0,255,65,.12);
    border:1px solid rgba(0,255,65,.4);color:var(--green);font-family:inherit;
    font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  .go-btn:hover{background:var(--green);color:#000;}

  .hint{font-size:.72rem;color:rgba(0,255,65,.25);margin-bottom:6px;}
  .examples{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px;}
  .ex-chip{
    font-size:.72rem;padding:3px 10px;border-radius:999px;
    border:1px solid rgba(0,255,65,.15);color:rgba(0,255,65,.4);
    cursor:pointer;transition:all .15s;font-family:inherit;background:none;
  }
  .ex-chip:hover{border-color:rgba(0,255,65,.5);color:var(--green);}

  .input-error{font-size:.78rem;color:var(--orange);margin-top:6px;min-height:18px;}

  /* live preview skeleton in home */
  .home-preview{
    border:1px solid rgba(0,255,65,.1);border-radius:8px;
    padding:14px;background:rgba(0,255,65,.02);
    margin-top:16px;display:none;
  }
  .home-preview.visible{display:block;animation:fadeIn .25s ease;}

  /* ══ INVITE PAGE ════════════════════════════════════════ */
  .identity{margin-bottom:20px;}
  .identity-type{font-size:10px;color:var(--dim);letter-spacing:3px;text-transform:uppercase;margin-bottom:5px;}
  .identity-id{font-size:1.25rem;color:var(--green);word-break:break-all;}
  .identity-id .sigil{color:var(--orange);}

  /* ── Preview card ── */
  .preview-card{
    display:flex;align-items:center;gap:14px;
    padding:14px 16px;border-radius:8px;
    background:rgba(0,255,65,.03);border:1px solid rgba(0,255,65,.1);
    margin-bottom:20px;min-height:68px;
  }
  .preview-avatar{
    width:48px;height:48px;border-radius:50%;flex-shrink:0;
    background:rgba(0,255,65,.08);border:1px solid rgba(0,255,65,.15);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;overflow:hidden;
  }
  .preview-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .preview-room-avatar{border-radius:10px;}
  .preview-info{flex:1;min-width:0;}
  .preview-name{font-size:.95rem;font-weight:700;color:var(--green);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .preview-meta{font-size:.72rem;color:var(--dim);}
  .preview-topic{font-size:.75rem;color:rgba(0,255,65,.45);margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .preview-status{
    display:flex;align-items:center;gap:6px;font-size:.7rem;
  }
  .preview-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;animation:pulse 2s infinite;}
  .preview-dot.loading{background:rgba(0,255,65,.3);animation:pulse 1s infinite;}
  .preview-dot.error{background:var(--orange);animation:none;}

  .spinner{
    width:14px;height:14px;border:2px solid rgba(0,255,65,.2);
    border-top-color:var(--green);border-radius:50%;
    animation:spin .7s linear infinite;display:inline-block;flex-shrink:0;
  }

  p.desc{font-size:.88rem;color:var(--muted);margin-bottom:20px;line-height:1.6;}

  .section-label{font-size:10px;color:rgba(0,255,65,.28);letter-spacing:3px;text-transform:uppercase;margin-bottom:9px;}

  .buttons{display:flex;flex-direction:column;gap:7px;margin-bottom:22px;}
  a.btn{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 13px;border-radius:8px;text-decoration:none;color:var(--green);
    border:1px solid rgba(0,255,65,.16);font-weight:600;font-size:.84rem;
    font-family:inherit;transition:border-color .15s,background .15s,transform .1s;
    background:rgba(0,255,65,.02);cursor:pointer;
  }
  a.btn:hover{border-color:rgba(0,255,65,.45);background:rgba(0,255,65,.06);transform:translateX(2px);}
  a.btn.primary{background:rgba(0,255,65,.07);border-color:rgba(0,255,65,.38);}
  a.btn.primary:hover{background:rgba(0,255,65,.14);border-color:var(--green);}

  .btn-left{display:flex;align-items:center;gap:9px;}
  .btn-icon{width:24px;height:24px;border-radius:5px;background:rgba(0,255,65,.06);border:1px solid rgba(0,255,65,.1);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
  .btn-meta{display:flex;flex-direction:column;gap:1px;}
  .btn-name{font-size:.83rem;}
  .btn-desc{font-size:.68rem;color:rgba(0,255,65,.38);font-weight:400;}
  .btn-arrow{font-size:.72rem;color:rgba(0,255,65,.22);transition:color .15s,transform .15s;}
  a.btn:hover .btn-arrow{color:var(--green);transform:translateX(3px);}

  hr.div{border:none;border-top:1px solid rgba(0,255,65,.07);margin:16px 0;}

  .copy-row{display:flex;align-items:center;gap:7px;margin-bottom:16px;}
  .copy-input{
    flex:1;background:rgba(0,255,65,.03);border:1px solid rgba(0,255,65,.1);
    border-radius:8px;padding:7px 11px;color:rgba(0,255,65,.45);
    font-family:inherit;font-size:.7rem;outline:none;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;
  }
  button.copy-btn{
    padding:6px 12px;border-radius:8px;background:transparent;color:var(--green);
    border:1px solid rgba(0,255,65,.22);font-family:inherit;font-size:.72rem;font-weight:600;
    cursor:pointer;transition:all .15s;white-space:nowrap;
  }
  button.copy-btn:hover{background:var(--green);color:#000;}
  button.copy-btn.ok{background:rgba(0,255,65,.1);border-color:var(--green);}

  .footer-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
  .fn{font-size:.68rem;color:rgba(0,255,65,.18);}
  .fn a{color:var(--orange);text-decoration:underline;}
  .fn a:hover{color:#ff8833;}

  .back-link{
    display:inline-block;margin-bottom:20px;font-size:.75rem;
    color:var(--orange);text-decoration:underline;cursor:pointer;
  }
  .back-link:hover{color:#ff8833;}

  /* ══ ELEMENT POPUP ══════════════════════════════════════ */
  .overlay{
    display:none;position:fixed;inset:0;z-index:200;
    background:rgba(0,0,0,.82);backdrop-filter:blur(6px);
    align-items:center;justify-content:center;padding:20px;
  }
  .overlay.open{display:flex;}
  .popup{
    background:#000;border:1px solid rgba(0,255,65,.35);border-radius:var(--radius);
    padding:30px;max-width:420px;width:100%;
    box-shadow:0 0 80px rgba(0,255,65,.12);position:relative;
    animation:fadeIn .2s ease;
  }
  .popup::before{content:'element://';position:absolute;top:14px;left:18px;font-size:10px;color:rgba(0,255,65,.18);}
  .popup-close{
    position:absolute;top:8px;right:12px;background:none;border:none;
    color:rgba(0,255,65,.28);font-size:17px;cursor:pointer;font-family:inherit;
    transition:color .15s;padding:4px 8px;line-height:1;
  }
  .popup-close:hover{color:var(--green);background:none;}
  .popup h2{font-size:.98rem;margin:14px 0 4px;color:var(--green);}
  .popup-sub{font-size:.76rem;color:var(--dim);margin-bottom:16px;line-height:1.5;}
  .popup-id{
    font-size:.8rem;color:var(--muted);background:rgba(0,255,65,.04);
    border:1px solid rgba(0,255,65,.1);border-radius:6px;padding:7px 11px;
    margin-bottom:16px;word-break:break-all;
  }
  .popup-id .sigil{color:var(--orange);}
  .popup-options{display:flex;flex-direction:column;gap:7px;margin-bottom:14px;}
  .popup-options a{
    display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:8px;
    text-decoration:none;color:var(--green);border:1px solid rgba(0,255,65,.16);
    font-family:inherit;font-size:.82rem;font-weight:600;background:rgba(0,255,65,.02);
    cursor:pointer;transition:all .15s;
  }
  .popup-options a:hover{border-color:rgba(0,255,65,.5);background:rgba(0,255,65,.07);}
  .popup-options a.opt-primary{background:rgba(0,255,65,.08);border-color:rgba(0,255,65,.4);}
  .popup-options a.opt-primary:hover{background:rgba(0,255,65,.14);border-color:var(--green);}
  .opt-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center;}
  .opt-meta{display:flex;flex-direction:column;gap:2px;}
  .opt-label{font-size:.82rem;}
  .opt-sub{font-size:.67rem;color:rgba(0,255,65,.33);font-weight:400;}
  .popup hr{border:none;border-top:1px solid rgba(0,255,65,.07);margin:4px 0 10px;}
  .popup-note{font-size:.65rem;color:rgba(0,255,65,.2);line-height:1.55;}
  .popup-note strong{color:rgba(0,255,65,.38);}

  @media(max-width:480px){
    .card{padding:24px 16px 28px;}
    .identity-id{font-size:1.05rem;}
    .popup{padding:22px 16px;}
    h1{font-size:1.25rem;}
  }
</style>
</head>
<body>

<!-- Element popup -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true">
  <div class="popup">
    <button class="popup-close" onclick="closePopup()">&times;</button>
    <h2>open with element</h2>
    <p class="popup-sub">Element will handle the invite. Make sure the <strong>desktop app is installed</strong> for the best experience.</p>
    <div class="popup-id"><span class="sigil" id="popup-id-sigil"></span><span id="popup-id-text"></span></div>
    <div class="popup-options" id="popup-opts"></div>
    <p class="popup-note">If the <strong>element:// link doesn't work</strong>, try clicking "download element" instead. For mobile, use the Element app from your app store.</p>
  </div>
</div>

<!-- Main card -->
<div class="card" id="card"></div>

<script>(function(){
// MAIN DOMAIN - adjust for your deployment
const MY_DOMAIN=window.location.origin;

// ── Clients ────────────────────────────────────────────────────
const CLIENTS=[
  {
    name:'Element Web',
    desc:'element.io — open in browser',
    icon:'🌐',
    isEl:false,
    url:{room:r=>`https://app.element.io/#/room/${enc(r)}`,user:u=>`https://app.element.io/#/user/${enc(u)}`}
  },
  {
    name:'Element Desktop',
    desc:'element:// — app must be installed',
    icon:'🖥',
    isEl:true,
    url:{room:r=>`element://room/${enc(r)}`,user:u=>`element://user/${enc(u)}`}
  },
  {
    name:'Hydrogen',
    desc:'hydrogen.element.io — lightweight',
    icon:'💫',
    isEl:false,
    url:{room:r=>`https://hydrogen.element.io/#/session/create?defaultHomeServer=https://matrix.org&room=${enc(r)}`,user:u=>`https://hydrogen.element.io/#/room/${enc(u)}`}
  },
  {
    name:'SchildiChat',
    desc:'schildi.chat — feature-rich',
    icon:'🚀',
    isEl:false,
    url:{room:r=>`https://app.schildi.chat/#/room/${enc(r)}`,user:u=>`https://app.schildi.chat/#/user/${enc(u)}`}
  },
  {
    name:'Nheko',
    desc:'nheko.im — desktop app',
    icon:'📱',
    isEl:false,
    url:{room:r=>`https://nheko.im/?room=${enc(r)}`,user:u=>`https://nheko.im/?user=${enc(u)}`}
  },
];

let _pid=null, _ptype=null;
let _deb=null;

window.openPopup=function(){
  const pid=_pid, ptype=_ptype;
  if(!pid) return;
  const sigil=pid[0];
  const rest=pid.slice(1);
  document.getElementById('popup-id-sigil').textContent=esc(sigil);
  document.getElementById('popup-id-text').textContent=esc(rest);
  const opts=CLIENTS.filter(c=>c.isEl).map(c=>{
    const href=ptype==='room'?c.url.room(pid):c.url.user(pid);
    return `<a href="${esc(href)}" class="opt-primary" onclick="closePopup()">
      <span class="opt-icon">${c.icon}</span><span class="opt-meta"><span class="opt-label">${c.name}</span><span class="opt-sub">${c.desc}</span></span>
    </a>`;
  }).join('');
  document.getElementById('popup-opts').innerHTML=opts+`
    <hr/>
    <a href="https://element.io/download" target="_blank" rel="noopener" onclick="closePopup()">
      <span class="opt-icon">⬇</span><span class="opt-meta"><span class="opt-label">Download Element</span><span class="opt-sub">element.io — Web · Desktop · Android · iOS</span></span>
    </a>`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
};
window.closePopup=function(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
};
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay')) closePopup(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closePopup(); });

window.copyLink=function(){
  const inp=document.getElementById('copy-inp');
  const btn=document.getElementById('copy-btn');
  if(!inp) return;
  navigator.clipboard.writeText(inp.value).then(()=>{
    btn.textContent='copied!';btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent='copy';btn.classList.remove('ok'); },2000);
  }).catch(()=>{ inp.select();document.execCommand('copy'); });
};

// ── Pages ─────────────────────────────────────────────────────
function renderHome(){
  document.title='escape.feds.farm';
  const card=document.getElementById('card');
  card.innerHTML=`
    <div class="brand"><span class="badge">MATRIX</span><span class="brand-label">open protocol</span></div>
    <div id="page-home">
      <h1>Join via Matrix</h1>
      <p class="sub">Enter a room alias or user ID to generate a shareable invite link.</p>
      <div class="input-row">
        <input class="matrix-input" id="id-input" placeholder="#room:server.tld or @user:server.tld" autocomplete="off" spellcheck="false"/>
        <button class="go-btn" onclick="goFromInput()">→ go</button>
      </div>
      <div class="input-error" id="input-err"></div>
      <div class="hint">// try an example</div>
      <div class="examples">
        <button class="ex-chip" onclick="setInput('#main:feds.farm')">#main:feds.farm</button>
        <button class="ex-chip" onclick="setInput('@root:feds.farm')">@root:feds.farm</button>
        <button class="ex-chip" onclick="setInput('#matrix:matrix.org')">#matrix:matrix.org</button>
      </div>
      <div id="home-preview" class="home-preview"></div>
      <div class="card-footer-line">
        <a href="https://github.com/zeroarchroot/escape.feds.farm" target="_blank" rel="noopener">[sources]</a>
      </div>
    </div>`;

  const inp=document.getElementById('id-input');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter') goFromInput(); });
  inp.addEventListener('input', debounce(onInputChange, 600));
  inp.focus();
}

window.setInput=function(val){
  document.getElementById('id-input').value=val;
  onInputChange();
};

let _debTimer=null;
function debounce(fn,ms){ return function(){ clearTimeout(_debTimer);_debTimer=setTimeout(fn,ms); }; }

async function onInputChange(){
  const raw=(document.getElementById('id-input')||{}).value||'';
  const val=raw.trim();
  const prev=document.getElementById('home-preview');
  if(!prev) return;
  const type=val?classify(val):null;
  document.getElementById('input-err').textContent='';
  if(!type || !val.includes(':')){
    prev.classList.remove('visible');
    prev.innerHTML='';
    return;
  }
  // show loading
  prev.classList.add('visible');
  prev.innerHTML=previewLoadingHtml();
  try{
    let html;
    if(type==='user'){
      const p=await fetchUserProfile(val);
      html=userPreviewHtml(val,p);
    } else {
      const r=await fetchRoomPreview(val);
      html=roomPreviewHtml(val,r);
    }
    if((document.getElementById('id-input')||{}).value&&document.getElementById('id-input').value.trim()===val){
      prev.innerHTML=html;
    }
  }catch(_){ prev.innerHTML=previewErrorHtml(val); }
}

window.goFromInput=function(){
  const raw=(document.getElementById('id-input')||{}).value||'';
  const val=raw.trim();
  if(!val){ setErr('enter a room alias or user ID'); return; }
  const type=classify(val);
  if(!type){ setErr('must start with # (room) or @ (user)'); return; }
  if(!val.includes(':')){ setErr('must include a server name, e.g. #room:server.tld'); return; }
  window.location.hash='#'+val;
};
function setErr(msg){ const e=document.getElementById('input-err'); if(e) e.textContent='// '+msg; }

// ── Invite page ───────────────────────────────────────────────
async function renderInvite(id){
  const type=classify(id);
  document.title=`${id} — escape.feds.farm`;
  const shareUrl=`${MY_DOMAIN}/#${id}`;
  _pid=id; _ptype=type;

  const card=document.getElementById('card');
  const desc=type==='room'?'Join this Matrix room with any compatible client below.':'Start a conversation with this Matrix user using any client below.';

  const btnHtml=CLIENTS.map(c=>{
    if(c.isEl) return `<a class="btn primary" href="javascript:void(0)" onclick="openPopup()" role="button"><span class="btn-left"><span class="btn-icon">${c.icon}</span><span class="btn-meta"><span class="btn-name">${c.name}</span><span class="btn-desc">${c.desc}</span></span></span><span class="btn-arrow">→</span></a>`;
    const href=type==='room'?c.url.room(id):c.url.user(id);
    return `<a class="btn" href="${esc(href)}" target="_blank" rel="noopener noreferrer"><span class="btn-left"><span class="btn-icon">${c.icon}</span><span class="btn-meta"><span class="btn-name">${c.name}</span><span class="btn-desc">${c.desc}</span></span></span><span class="btn-arrow">→</span></a>`;
  }).join('');

  card.innerHTML=`
    <div class="brand"><span class="badge">MATRIX</span><span class="brand-label">open protocol</span></div>
    <span class="back-link" onclick="goHome()">← create another link</span>
    <div class="identity">
      <div class="identity-type">// ${type}</div>
      <div class="identity-id"><span class="sigil">${esc(id[0])}</span>${esc(id.slice(1))}</div>
    </div>
    <div id="preview-slot">${previewLoadingHtml()}</div>
    <p class="desc">${desc}</p>
    <div class="section-label">// open with client</div>
    <div class="buttons">${btnHtml}</div>
    <hr class="div"/>
    <div class="section-label">// share</div>
    <div class="copy-row">
      <input class="copy-input" id="copy-inp" type="text" readonly value="${esc(shareUrl)}"/>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">copy</button>
    </div>
    <div class="card-footer-line">
      <a href="https://github.com/zeroarchroot/escape.feds.farm" target="_blank" rel="noopener">[sources]</a>
    </div>`;

  // Fetch live preview asynchronously
  setTimeout(async ()=>{
    const slot=document.getElementById('preview-slot');
    if(!slot) return;
    try{
      let html;
      if(type==='user'){
        const p=await fetchUserProfile(id);
        html=userPreviewHtml(id,p);
      } else {
        const r=await fetchRoomPreview(id);
        html=roomPreviewHtml(id,r);
      }
      if(slot && slot.isConnected) slot.innerHTML=html;
    }catch(err){
      console.error('Preview fetch error:', err);
      if(slot && slot.isConnected) slot.innerHTML=previewErrorHtml(id);
    }
  }, 0);
}

window.goHome=function(){
  window.location.hash='';
};

// ── Router ────────────────────────────────────────────────────
function route(){
  const id=getId();
  const type=id?classify(id):null;
  if(id && type) renderInvite(id);
  else renderHome();
}

window.addEventListener('hashchange', route);

// Initialize routing when page loads
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', route);
} else {
  route();
}

})();

// ── Helpers ───────────────────────────────────────────────────
function enc(s){ return encodeURIComponent(s); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function serverOf(id){ const c=id.indexOf(':'); return c>0 ? id.slice(c+1) : null; }
function classify(id){
  if(id.startsWith('@')) return 'user';
  if(/^[#!]/.test(id))  return 'room';
  return null;
}
function getId(){
  const h=window.location.hash.slice(1);
  if(!h) return '';
  // If it doesn't start with @ or #, but looks like a room alias, add the #
  if(!h.startsWith('@') && !h.startsWith('#') && !h.startsWith('!') && h.includes(':')){
    return '#'+h;
  }
  return h;
}

// ── Matrix API ────────────────────────────────────────────────
// Step 1: resolve server base URL via .well-known
const _hsCache={};
async function resolveHS(server){
  if(_hsCache[server]) return _hsCache[server];
  try{
    const r=await fetch(`https://${server}/.well-known/matrix/client`,{signal:AbortSignal.timeout(4000)});
    if(r.ok){
      const j=await r.json();
      const base=(j['m.homeserver']||{}).base_url||null;
      if(base){ _hsCache[server]=base.replace(/\/$/,''); return _hsCache[server]; }
    }
  }catch(_){}
  // fallback: assume server is the homeserver
  _hsCache[server]=`https://${server}`;
  return _hsCache[server];
}

// Convert mxc:// → HTTPS thumbnail URL
function mxcToHttp(mxc, server, size=64){
  if(!mxc||!mxc.startsWith('mxc://')) return null;
  const rest=mxc.slice(6); // "mediaServer/mediaId"
  const slash=rest.indexOf('/');
  if(slash<0) return null;
  const mediaServer=rest.slice(0,slash), mediaId=rest.slice(slash+1);
  // Use the media server from the mxc URL, not the homeserver
  return `https://${mediaServer}/_matrix/media/v3/thumbnail/${mediaServer}/${mediaId}?width=${size}&height=${size}&method=crop`;
}

// Fetch user profile (unauthenticated per spec)
async function fetchUserProfile(userId){
  const server=serverOf(userId);
  if(!server) return null;
  const hs=await resolveHS(server);
  const url=`${hs}/_matrix/client/v3/profile/${enc(userId)}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(5000)});
  if(!r.ok) return null;
  return await r.json(); // {displayname?, avatar_url?}
}

// Fetch room preview via publicRooms search (no auth needed for GET)
async function fetchRoomPreview(roomAlias){
  const server=serverOf(roomAlias);
  if(!server) return null;
  const hs=await resolveHS(server);
  
  // First resolve alias → room_id
  const dirUrl=`${hs}/_matrix/client/v3/directory/room/${enc(roomAlias)}`;
  let roomId=null;
  try{
    const r=await fetch(dirUrl,{signal:AbortSignal.timeout(5000)});
    if(r.ok){ 
      const j=await r.json(); 
      roomId=j.room_id||null;
      // If we got the room_id directly, try to get more info from publicRooms
      if(roomId) {
        try {
          const pubUrl=`${hs}/_matrix/client/v3/publicRooms?limit=1`;
          const r2=await fetch(pubUrl,{signal:AbortSignal.timeout(5000)}, {method:'POST', body:JSON.stringify({filter:{generic_search_term:roomAlias.replace(/^[#!]/,'').split(':')[0]}})});
          if(r2.ok){
            const j2=await r2.json();
            const rooms=j2.chunk||[];
            const match=rooms.find(rm=>
              rm.room_id===roomId ||
              rm.canonical_alias===roomAlias ||
              (rm.aliases||[]).includes(roomAlias)
            ) || (rooms.length>0 ? rooms[0] : null);
            if(match) return {
              name:match.name||match.canonical_alias||roomAlias,
              topic:match.topic||null,
              avatar_url:match.avatar_url||null,
              num_joined_members:match.num_joined_members||0,
              server,
            };
          }
        }catch(_){}
        // If publicRooms failed but we have a room_id, return basic info
        return {
          name:roomAlias,
          topic:null,
          avatar_url:null,
          num_joined_members:0,
          server,
        };
      }
    }
  }catch(_){}

  // Fallback: Try publicRooms search by alias
  try{
    const pubUrl=`${hs}/_matrix/client/v3/publicRooms?limit=1&filter=${enc(JSON.stringify({generic_search_term:roomAlias.replace(/^#/,'').split(':')[0]}))}`;
    const r2=await fetch(pubUrl,{signal:AbortSignal.timeout(5000)});
    if(r2.ok){
      const j2=await r2.json();
      const rooms=j2.chunk||[];
      const match=rooms.find(rm=>
        (roomId && rm.room_id===roomId) ||
        rm.canonical_alias===roomAlias ||
        (rm.aliases||[]).includes(roomAlias)
      ) || (rooms.length>0 ? rooms[0] : null);
      if(match) return {
        name:match.name||match.canonical_alias||roomAlias,
        topic:match.topic||null,
        avatar_url:match.avatar_url||null,
        num_joined_members:match.num_joined_members||0,
        server,
      };
    }
  }catch(_){}
  
  // No public data available — return minimal info so at least the invite works
  return {
    name:roomAlias,
    topic:null,
    avatar_url:null,
    num_joined_members:0,
    server,
  };
}

// ── Preview rendering ─────────────────────────────────────────
function avatarHtml(name, avatarUrl, server, isRoom){
  const shape = isRoom ? ' preview-room-avatar' : '';
  if(avatarUrl){
    const httpUrl=mxcToHttp(avatarUrl, server, 96);
    if(httpUrl) return `<div class="preview-avatar${shape}"><img src="${esc(httpUrl)}" alt="" onerror="this.parentNode.innerHTML='${esc(defaultAvatar(name))}';"/></div>`;
  }
  return defaultAvatar(name);
}
function defaultAvatar(name){
  return `<div class="preview-avatar">${name?name[0].toUpperCase():'?'}</div>`;
}
function userPreviewHtml(userId, profile){
  const p=profile||{};
  const displayName=p.displayname||userId;
  return `
    <div class="preview-card">
      ${avatarHtml(displayName, p.avatar_url, serverOf(userId), false)}
      <div class="preview-info">
        <div class="preview-name">${esc(displayName)}</div>
        <div class="preview-meta">${esc(userId)}</div>
      </div>
      <div class="preview-status"><div class="preview-dot"></div><span>online</span></div>
    </div>`;
}
function roomPreviewHtml(roomAlias, room){
  if(!room) {
    // Room exists but no info available - still show something useful
    return `<div class="preview-card"><div class="preview-info"><div class="preview-name">${esc(roomAlias)}</div><div class="preview-meta">room exists (no public info)</div></div></div>`;
  }
  const name=room.name||roomAlias;
  const members=room.num_joined_members||0;
  const topic=room.topic||'(no topic)';
  return `
    <div class="preview-card">
      ${avatarHtml(name, room.avatar_url, room.server, true)}
      <div class="preview-info">
        <div class="preview-name">${esc(name)}</div>
        <div class="preview-meta">${members} members</div>
        <div class="preview-topic">${esc(topic)}</div>
      </div>
    </div>`;
}
function previewLoadingHtml(){
  return `<div class="preview-card"><div class="preview-info"><div class="preview-name">loading...</div><div class="preview-meta">fetching room info</div></div><div class="preview-status"><div class="preview-dot loading"></div></div></div>`;
}
function previewErrorHtml(id){
  return `<div class="preview-card"><div class="preview-info"><div class="preview-name">${esc(id)}</div><div class="preview-meta">could not load info</div></div><div class="preview-status"><div class="preview-dot error"></div></div></div>`;
}
